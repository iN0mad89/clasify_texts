袘褞写卸械褌:
  - "(?i)\\b(写械褉卸邪胁薪.{0,5}斜褞写卸械褌|褎芯薪写|谐褉邪薪褌(?!芯胁械))"
袧邪褍泻芯胁械褑褜:
  - "(?i)\\b(邪褋锌褨褉邪薪褌(泻邪)?|邪写'褞薪泻褌|写芯泻褌芯褉邪薪褌|胁褔械薪懈泄|胁褔械薪械 蟹胁邪薪薪褟|薪邪褍泻芯胁械褑褜)"
袉薪褋褌懈褌褍褌:
  - "(?i)\\b(褨薪褋褌懈褌褍褌|谢邪斜芯褉邪褌芯褉褨(褟|褩)|褑械薪褌褉)"
袪械谐褍谢褞胁邪薪薪褟:
  - "(?i)\\b(锌芯褋褌邪薪芯胁邪|薪邪泻邪蟹|褉械谐褍谢褞胁邪薪薪(褟|褨))"
小褌邪褌褍褋:
  - "(?i)\\b(蟹胁邪薪薪褟|薪邪谐芯褉芯写(邪|懈)|锌芯褔械褋薪(懈|邪))"
斜邪蟹懈褋 袧袧孝袛:
  - "(?i)\\b(薪邪褍泻(懈|邪)|褨薪薪芯胁邪褑褨(褟|褩)|褌械褏薪芯谢芯谐(褨|褨褟))"
袨屑芯薪褨屑:
  - "(?i)\\b(薪邪褍泻邪(?=\s+锌褉芯\s+锌褉懈褉芯写褍)|蟹邪泻芯薪褍(?=\s+锌褉懈褉芯写懈))"
